services:
  postgres:
    image: postgres:16-alpine
    container_name: storybook-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: storybook
      POSTGRES_USER: storybook
      POSTGRES_PASSWORD: storybook
    ports:
      - "5432:5432"
    volumes:
      - storybook-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storybook -d storybook"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  storybook-postgres-data:
